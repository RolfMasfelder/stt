name: Backend Tests

on:
  push:
    branches: [dev, main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'manage.py'
      - '.github/workflows/backend-test.yml'
  pull_request:
    branches: [dev, main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'manage.py'
      - '.github/workflows/backend-test.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: stt
          POSTGRES_USER: stt
          POSTGRES_PASSWORD: stt_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stt"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://stt:stt_dev@127.0.0.1:5432/stt
      DJANGO_SETTINGS_MODULE: stt.settings
      DJANGO_SECRET_KEY: ci-test-key-not-for-production
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v7

      - name: Setup Python & dependencies
        uses: ./.github/actions/setup-python
        with:
          install-dev: 'true'
          install-system-deps: 'true'

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Django system checks
        run: python manage.py check

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests with coverage
        run: |
          pytest \
            --tb=short -q \
            --cov=stt \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
