name: Backend Security

on:
  push:
    branches: [dev, main]
    paths:
      - 'src/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/backend-security.yml'
  pull_request:
    branches: [dev, main]
    paths:
      - 'src/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/backend-security.yml'
  schedule:
    - cron: '0 8 * * 1'  # Weekly Monday 08:00 UTC

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-audit:
    name: Dependency Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python & dependencies
        uses: ./.github/actions/setup-python

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit installed packages
        run: pip-audit --desc --output pip-audit-report.txt
        continue-on-error: true

      - name: Show audit results
        if: always()
        run: cat pip-audit-report.txt

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-report
          path: pip-audit-report.txt
          retention-days: 90

  code-security:
    name: Static Security Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit on source code
        run: |
          bandit -r src/ \
            -ll \
            --severity-level medium \
            -f txt \
            -o bandit-report.txt \
            || true
          [ -f bandit-report.txt ] || echo 'No findings.' > bandit-report.txt

      - name: Show bandit results
        if: always()
        run: cat bandit-report.txt

      - name: Fail on high-severity issues
        run: bandit -r src/ --severity-level high

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.txt
          retention-days: 90
