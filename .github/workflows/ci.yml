name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: stt
          POSTGRES_USER: stt
          POSTGRES_PASSWORD: stt_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stt"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://stt:stt_dev@127.0.0.1:5432/stt
      DJANGO_SETTINGS_MODULE: stt.settings
      DJANGO_SECRET_KEY: ci-test-key-not-for-production
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1 portaudio19-dev

      - name: Install Python dependencies
        run: |
          pip install --extra-index-url https://download.pytorch.org/whl/cpu \
            torch==2.11.0+cpu torchaudio==2.11.0+cpu torchcodec==0.11.0
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Run tests
        run: pytest --tb=short -q

      - name: Lint with ruff
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/
