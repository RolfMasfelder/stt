name: Docker Build

on:
  push:
    branches: [dev, main]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'requirements.txt'
      - 'src/**'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches: [dev, main]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'requirements.txt'
      - 'src/**'
      - '.github/workflows/docker-build.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Verify Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build production Docker image
        run: docker build -t stt-server:ci --target production --build-arg SKIP_MODEL_CACHE=1 .

      - name: Build dev Docker image
        run: docker build -t stt-server:ci-dev --target dev --build-arg SKIP_MODEL_CACHE=1 .

      - name: Verify image metadata
        run: |
          echo "::group::Image details"
          docker inspect stt-server:ci --format '{{.Config.User}}' | grep -q 'stt' \
            && echo "✓ Non-root user configured" \
            || echo "::warning::Container runs as root"
          docker images --filter 'reference=stt-server:ci*'
          echo "::endgroup::"

      - name: Smoke test – production image import check
        run: |
          docker run --rm stt-server:ci \
            python -c "import stt; import django; print('imports OK')"

      - name: Smoke test – dev image has pytest
        run: |
          docker run --rm stt-server:ci-dev \
            python -c "import pytest; print('pytest', pytest.__version__)"

      - name: Verify production image has no dev dependencies
        run: |
          if docker run --rm stt-server:ci python -c "import pytest" 2>/dev/null; then
            echo "::error::pytest found in production image"
            exit 1
          fi
          echo "pytest not in production image"
