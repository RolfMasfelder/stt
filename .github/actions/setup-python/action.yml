name: Setup Python with PyTorch CPU
description: Set up Python 3.13, pip cache, and install PyTorch CPU + project dependencies

inputs:
  install-dev:
    description: Install dev dependencies (pip install -e ".[dev]")
    required: false
    default: 'false'
  install-system-deps:
    description: Install system dependencies (ffmpeg, libsndfile1, portaudio19-dev)
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
        cache: pip

    - name: Install system dependencies
      if: inputs.install-system-deps == 'true'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libsndfile1 portaudio19-dev

    - name: Install PyTorch CPU + requirements
      shell: bash
      run: |
        pip install --extra-index-url https://download.pytorch.org/whl/cpu \
          torch==2.11.0+cpu torchaudio==2.11.0+cpu torchcodec==0.11.0
        pip install -r requirements.txt

    - name: Install dev dependencies
      if: inputs.install-dev == 'true'
      shell: bash
      run: pip install -e ".[dev]"
