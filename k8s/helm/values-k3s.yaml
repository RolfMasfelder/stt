# values-k3s.yaml — override values for local k3s deployment
# Usage: helm install stt k8s/helm/stt/ -n stt -f k8s/helm/values-k3s.yaml

replicaCount: 1

image:
  repository: 192.168.178.80:5000/stt-server
  tag: KUSTOMIZE  # overridden by deploy-remote.sh --set image.tag=v<version>-<sha>
  pullPolicy: Always  # pull from local registry

worker:
  replicaCount: 1

mlService:
  replicaCount: 1
  image:
    repository: 192.168.178.80:5000/stt-ml
    tag: KUSTOMIZE  # overridden by deploy-remote.sh --set mlService.image.tag=v<version>-<sha>
    pullPolicy: Always
  port: 8091
  nodeSelector: {}
  tolerations: []
  whisperModel: small
  whisperDevice: cpu

database:
  host: postgres
  port: 5432
  name: stt
  user: stt
  existingSecret: postgres-credentials
  passwordKey: POSTGRES_PASSWORD

minio:
  endpoint: http://minio:9000
  existingSecret: minio-credentials
  accessKeyKey: MINIO_ROOT_USER
  secretKeyKey: MINIO_ROOT_PASSWORD

django:
  debug: true
  allowedHosts: "*"
  dataRetentionDays: 90

gunicorn:
  workers: 2
  timeout: 600

# -- LLM (Ollama in k8s/base/ollama.yaml, same namespace) --
llm:
  baseUrl: "http://ollama:11434"
  model: "mistral"

service:
  type: ClusterIP
  port: 8090

ingress:
  enabled: true
  className: nginx
  host: stt.local

resources:
  server:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: "1"
  worker:
    requests:
      memory: 256Mi
      cpu: 50m
    limits:
      memory: 512Mi
      cpu: 500m
  mlService:
    requests:
      memory: 512Mi
      cpu: 200m
    limits:
      memory: 2Gi
      cpu: "2"

autoscaling:
  server:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 50
  worker:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 60
  mlService:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 50
