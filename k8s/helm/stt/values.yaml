# -- STT Helm chart values --

replicaCount: 1

nodeSelector: {}

image:
  repository: stt-server
  tag: KUSTOMIZE
  pullPolicy: IfNotPresent

# -- Worker (django-q2, lightweight tasks: GDPR, scheduling) --
worker:
  replicaCount: 1

# -- ML Service (FastAPI microservice: Whisper, pyannote) --
mlService:
  replicaCount: 1
  image:
    repository: stt-ml
    tag: KUSTOMIZE
    pullPolicy: IfNotPresent
  port: 8091
  # For GPU nodes, set nodeSelector and tolerations:
  # nodeSelector:
  #   nvidia.com/gpu.present: "true"
  # tolerations:
  #   - key: nvidia.com/gpu
  #     operator: Exists
  #     effect: NoSchedule
  nodeSelector: {}
  tolerations: []
  whisperModel: small
  whisperDevice: cpu
  diarizeModel: pyannote/speaker-diarization-3.1
  diarizeDevice: cpu
  # Timeout (seconds) for stt-server → stt-ml HTTP requests.
  # Must be less than gunicorn.timeout and ingress proxy-read-timeout.
  timeout: 600
  # Persistent cache for HuggingFace models (Whisper + pyannote).
  # Without persistence the models are re-downloaded on every pod restart.
  persistence:
    enabled: false
    storageClass: ""       # "" = cluster default
    size: 10Gi
    accessMode: ReadWriteOnce
  # Reference an externally managed secret containing HF_STT_TOKEN.
  # Used when hfToken is empty (Option B).
  existingHfTokenSecret: ""

# HuggingFace token for pyannote models.
# Option A – let Helm manage the secret: set hfToken to the actual token string.
# Option B – use an externally created secret: leave hfToken empty and set
#             mlService.existingHfTokenSecret to the secret name.
hfToken: ""

# -- PostgreSQL (uses the existing k8s/base deployment) --
database:
  # Set to the in-cluster service name of the PostgreSQL instance.
  host: postgres
  port: 5432
  name: stt
  user: stt
  # Reference an existing secret for the password.
  existingSecret: postgres-credentials
  passwordKey: POSTGRES_PASSWORD

# -- MinIO / S3 storage --
minio:
  endpoint: http://minio:9000
  # Reference an existing secret for credentials.
  existingSecret: minio-credentials
  accessKeyKey: MINIO_ROOT_USER
  secretKeyKey: MINIO_ROOT_PASSWORD
  audioBucket: stt-audio
  resultsBucket: stt-results

# -- Django settings --
django:
  secretKey: ""  # Set in a secret; DO NOT commit real values.
  debug: false
  allowedHosts: "*"
  dataRetentionDays: 90

# -- Gunicorn --
gunicorn:
  workers: 2
  timeout: 600

# -- LLM config --
llm:
  baseUrl: ""
  model: ""

# -- Service --
service:
  type: ClusterIP
  port: 8090

# -- Ingress --
ingress:
  enabled: true
  className: nginx
  host: stt.local
  annotations: {}
  tls: []

# -- Resources --
resources:
  server:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 2Gi
      cpu: "2"
  worker:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  mlService:
    requests:
      memory: 2Gi
      cpu: "1"
    limits:
      memory: 8Gi
      cpu: "4"
      # For GPU nodes, add:
      # nvidia.com/gpu: "1"

# -- Autoscaling --
autoscaling:
  server:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  worker:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 60
  mlService:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
