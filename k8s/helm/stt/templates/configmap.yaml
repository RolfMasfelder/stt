apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "stt.fullname" . }}-env
  labels:
    {{- include "stt.labels" . | nindent 4 }}
data:
  DJANGO_SETTINGS_MODULE: stt.settings
  DEBUG: {{ .Values.django.debug | quote }}
  ALLOWED_HOSTS: {{ .Values.django.allowedHosts | quote }}
  DATA_RETENTION_DAYS: {{ .Values.django.dataRetentionDays | quote }}
  ML_SERVICE_URL: "http://{{ include "stt.fullname" . }}-ml:{{ .Values.mlService.port }}"
  {{- if .Values.llm.baseUrl }}
  LLM_BASE_URL: {{ .Values.llm.baseUrl | quote }}
  LLM_MODEL: {{ .Values.llm.model | quote }}
  {{- end }}
