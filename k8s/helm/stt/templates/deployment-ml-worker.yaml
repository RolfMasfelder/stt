apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "stt.fullname" . }}-ml-worker
  labels:
    {{- include "stt.labels" . | nindent 4 }}
    app.kubernetes.io/component: ml-worker
spec:
  replicas: {{ .Values.mlWorker.replicaCount }}
  selector:
    matchLabels:
      {{- include "stt.mlWorkerLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "stt.mlWorkerLabels" . | nindent 8 }}
    spec:
      {{- with .Values.mlWorker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mlWorker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ml-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "manage.py", "qcluster"]
          envFrom:
            - configMapRef:
                name: {{ include "stt.fullname" . }}-env
            - secretRef:
                name: {{ include "stt.fullname" . }}-config
          env:
            - name: Q_CLUSTER_NAME
              value: "ml"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.passwordKey }}
            - name: DATABASE_URL
              value: "postgres://{{ .Values.database.user }}:$(POSTGRES_PASSWORD)@{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
            {{- if .Values.hfToken }}
            - name: HF_STT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "stt.fullname" . }}-config
                  key: HF_STT_TOKEN
            {{- end }}
          resources:
            {{- toYaml .Values.resources.mlWorker | nindent 12 }}
