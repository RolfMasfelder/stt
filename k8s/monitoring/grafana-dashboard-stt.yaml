# STT dashboard – merge into the existing grafana-dashboards ConfigMap.
# Apply:
#   kubectl apply -f k8s/monitoring/grafana-dashboard-stt.yaml
#   kubectl rollout restart deployment/grafana -n monitoring
#
# Grafana mounts the 'grafana-dashboards' ConfigMap at /var/lib/grafana/dashboards.
# This file adds the STT dashboard JSON as a new key to that ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  stt-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Jobs Created (rate/min)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "sum(rate(stt_jobs_created_total{job=\"stt-server\"}[5m])) by (job_type) * 60",
              "legendFormat": "{{ job_type }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "ops"}
          }
        },
        {
          "title": "Jobs Completed vs Failed (rate/min)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "sum(rate(stt_jobs_completed_total{job=\"stt-server\"}[5m])) * 60",
              "legendFormat": "completed",
              "refId": "A"
            },
            {
              "expr": "sum(rate(stt_jobs_failed_total{job=\"stt-server\"}[5m])) * 60",
              "legendFormat": "failed",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "ops"}
          }
        },
        {
          "title": "Job Duration p50 / p95 / p99",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(stt_job_duration_seconds_bucket{job=\"stt-server\"}[5m])) by (le))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(stt_job_duration_seconds_bucket{job=\"stt-server\"}[5m])) by (le))",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(stt_job_duration_seconds_bucket{job=\"stt-server\"}[5m])) by (le))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "s"}
          }
        },
        {
          "title": "HTTP Request Rate by Status",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "targets": [
            {
              "expr": "sum(rate(django_http_responses_total_by_status_total{job=\"stt-server\"}[5m])) by (status) * 60",
              "legendFormat": "HTTP {{ status }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "reqps"}
          }
        },
        {
          "title": "HTTP Request Duration p95",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(django_http_requests_latency_seconds_by_view_method_bucket{job=\"stt-server\"}[5m])) by (le, view))",
              "legendFormat": "{{ view }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "s"}
          }
        },
        {
          "title": "GDPR Auto-Deleted Jobs (total)",
          "type": "stat",
          "gridPos": {"h": 8, "w": 6, "x": 12, "y": 16},
          "targets": [
            {
              "expr": "stt_gdpr_auto_deleted_total{job=\"stt-server\"}",
              "legendFormat": "deleted",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Pod CPU Usage",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 6, "x": 18, "y": 16},
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"stt\", container!=\"\"}[5m])) by (pod)",
              "legendFormat": "{{ pod }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "percentunit"}
          }
        },
        {
          "title": "STT Logs",
          "type": "logs",
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 24},
          "targets": [
            {
              "expr": "{namespace=\"stt\"}",
              "refId": "A"
            }
          ],
          "datasource": {"type": "loki", "uid": "loki"},
          "options": {
            "showTime": true,
            "sortOrder": "Descending",
            "enableLogDetails": true
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["stt", "monitoring"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "title": "STT — Speech-to-Text",
      "uid": "stt-overview"
    }
