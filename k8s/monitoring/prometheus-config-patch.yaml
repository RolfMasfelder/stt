# Prometheus ConfigMap patch — adds STT scrape targets and alert rules.
# Apply: kubectl apply -f k8s/monitoring/prometheus-config-patch.yaml
#
# This REPLACES the full ConfigMap. Keep eRechnung entries intact.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
    component: monitoring
data:
  alert_rules.yml: |
    groups:
      # --- eRechnung alerts (existing) ---
      - name: erechnung_health
        rules:
          - alert: DjangoDown
            expr: up{job="django"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Django backend is down"
              description: "The Django backend pod has been unreachable for more than 2 minutes."

          - alert: HighErrorRate
            expr: >
              rate(django_http_responses_total_by_status_total{status=~"5.."}[5m])
              / rate(django_http_responses_total_by_status_total[5m]) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High HTTP 5xx error rate (> 5%)"

          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total{namespace="erechnung"}[15m]) > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} is crash-looping"

      - name: erechnung_business
        rules:
          - alert: OverdueInvoicesHigh
            expr: erechnung_invoices_overdue_count > 10
            for: 1h
            labels:
              severity: warning
            annotations:
              summary: "Many overdue invoices ({{ $value }})"

          - alert: PDFGenerationFailureRate
            expr: >
              rate(erechnung_pdf_generation_total{result="error"}[15m])
              / rate(erechnung_pdf_generation_total[15m]) > 0.1
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "PDF generation failure rate > 10%"

      # --- STT alerts ---
      - name: stt_health
        rules:
          - alert: STTServerDown
            expr: up{job="stt-server"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "STT server is down"
              description: "The STT server pod has been unreachable for more than 2 minutes."

          - alert: STTPodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total{namespace="stt"}[15m]) > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "STT pod {{ $labels.pod }} is crash-looping"

          - alert: STTHighErrorRate
            expr: >
              rate(django_http_responses_total_by_status_total{job="stt-server",status=~"5.."}[5m])
              / rate(django_http_responses_total_by_status_total{job="stt-server"}[5m]) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "STT HTTP 5xx error rate > 5%"

      - name: stt_business
        rules:
          - alert: STTHighJobFailureRate
            expr: >
              rate(stt_jobs_failed_total[15m])
              / (rate(stt_jobs_completed_total[15m]) + rate(stt_jobs_failed_total[15m])) > 0.2
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "STT job failure rate > 20%"

          - alert: STTSlowJobs
            expr: histogram_quantile(0.95, rate(stt_job_duration_seconds_bucket[30m])) > 600
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "STT p95 job duration > 10 minutes"

  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      scrape_timeout: 10s

    rule_files:
      - "/etc/prometheus/alert_rules.yml"

    scrape_configs:
      # --- eRechnung (existing) ---
      - job_name: "django"
        static_configs:
          - targets: ["django-web-service.erechnung.svc:8000"]
            labels:
              service: "django-backend"
              environment: "kubernetes"
        metrics_path: /metrics

      # --- STT server metrics (django-prometheus) ---
      - job_name: "stt-server"
        static_configs:
          - targets: ["stt-stt.stt.svc:8090"]
            labels:
              service: "stt-server"
              environment: "kubernetes"
        metrics_path: /metrics

      # kube-state-metrics (cluster-level metrics)
      - job_name: "kube-state-metrics"
        static_configs:
          - targets: ["kube-state-metrics.kube-system.svc:8080"]

      # Prometheus self-monitoring
      - job_name: "prometheus"
        metrics_path: /prometheus/metrics
        static_configs:
          - targets: ["localhost:9090"]
