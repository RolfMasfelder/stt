server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Flutter SPA at /ui/ — unknown sub-routes fall back to index.html
    location /ui/ {
        try_files $uri $uri/ /ui/index.html;
    }

    # Redirect root to /ui/
    location = / {
        return 301 /ui/;
    }
}
