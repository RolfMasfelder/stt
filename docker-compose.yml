services:
  stt:
    build: .
    container_name: stt-app
    env_file:
      - .env
    volumes:
      - .:/app
      - ${AUDIO_INPUT_DIR}:/app/audio  # Mount for audio files
      - ${OUTPUT_DIR}:/app/output  # Mount for output files
    environment:
      - PYTHONPATH=/app
      - LM_STUDIO_HOST=${LM_STUDIO_HOST}
      - LM_STUDIO_PORT=${LM_STUDIO_PORT}
      - LM_STUDIO_MODEL=${LM_STUDIO_MODEL}
      - WHISPER_MODEL=${WHISPER_MODEL}
      - WHISPER_DEVICE=${WHISPER_DEVICE}
      - WHISPER_API_URL=${WHISPER_API_URL}
      - LOG_LEVEL=${LOG_LEVEL}
    networks:
      - stt-network
    depends_on:
      - lmstudio
    profiles:
      - production

  # Development service with more development-friendly settings
  stt-dev:
    build: .
    container_name: stt-dev
    env_file:
      - .env
    volumes:
      - .:/app
      - ${AUDIO_INPUT_DIR}:/app/audio
      - ${OUTPUT_DIR}:/app/output
    environment:
      - PYTHONPATH=/app
      - LM_STUDIO_HOST=${LM_STUDIO_HOST}
      - LM_STUDIO_PORT=${LM_STUDIO_PORT}
      - LM_STUDIO_MODEL=${LM_STUDIO_MODEL}
      - WHISPER_MODEL=${WHISPER_MODEL}
      - WHISPER_DEVICE=${WHISPER_DEVICE}
      - WHISPER_API_URL=${WHISPER_API_URL}
      - LOG_LEVEL=${LOG_LEVEL}
      - DEVELOPMENT_MODE=${DEVELOPMENT_MODE}
      - DEBUG=${DEBUG}
    network_mode: host  # Use host networking for easier development
    profiles:
      - dev
    command: bash  # Override to keep container running for development

  # Remote Whisper transcription server (faster-whisper-server)
  # Run on a more powerful machine for faster transcription
  whisper-server:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: whisper-server
    ports:
      - "8000:8000"
    environment:
      - WHISPER__MODEL=${WHISPER_MODEL:-small}
      - WHISPER__DEVICE=${WHISPER_DEVICE:-cpu}
    networks:
      - stt-network
    profiles:
      - whisper-remote

  # LM Studio service (placeholder for future implementation)
  lmstudio:
    image: alpine:latest  # Placeholder - replace with actual LM Studio image when available
    container_name: lmstudio
    env_file:
      - .env
    ports:
      - "${LM_STUDIO_PORT}:${LM_STUDIO_PORT}"
    networks:
      - stt-network
    profiles:
      - production
    command: sh -c "echo 'LM Studio placeholder - implement actual service' && sleep infinity"

networks:
  stt-network:
    driver: bridge
