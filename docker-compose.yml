services:
  db:
    image: postgres:17
    container_name: stt-db
    environment:
      POSTGRES_DB: stt
      POSTGRES_USER: stt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stt_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - stt-network
    profiles:
      - production
      - test

  # Caddy reverse-proxy with automatic TLS
  caddy:
    image: caddy:2-alpine
    container_name: stt-caddy
    depends_on:
      - stt-server
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-localhost}
    networks:
      - stt-network
    profiles:
      - production
    restart: unless-stopped

  stt-server:
    build:
      context: .
      target: production
    container_name: stt-server
    depends_on:
      - db
      - stt-ml
    env_file:
      - .env
    ports:
      - "8090:8090"
    volumes:
      - .:/app:z
    environment:
      - PYTHONPATH=/app
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      - ML_SERVICE_URL=http://stt-ml:8091
      - LOG_LEVEL=${LOG_LEVEL}
      - DATABASE_URL=postgres://stt:${POSTGRES_PASSWORD:-stt_dev}@db:5432/stt
      - DJANGO_SETTINGS_MODULE=stt.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-insecure-dev-key-change-in-production}
    networks:
      - stt-network
    profiles:
      - production
    command: ["python", "-m", "gunicorn", "stt.wsgi:application", "--bind", "0.0.0.0:8090", "--workers", "2", "--timeout", "600"]

  # django-q2 worker for async task processing
  stt-worker:
    build:
      context: .
      target: production
    container_name: stt-worker
    depends_on:
      - db
      - stt-ml
    env_file:
      - .env
    volumes:
      - .:/app:z
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgres://stt:${POSTGRES_PASSWORD:-stt_dev}@db:5432/stt
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      - ML_SERVICE_URL=http://stt-ml:8091
      - LOG_LEVEL=${LOG_LEVEL}
      - DJANGO_SETTINGS_MODULE=stt.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-insecure-dev-key-change-in-production}
    networks:
      - stt-network
    profiles:
      - production
    command: ["python", "manage.py", "qcluster"]

  # Test runner service (dev stage with pytest, ruff, bandit)
  stt-test:
    build:
      context: .
      target: dev
    container_name: stt-test
    depends_on:
      - db
    volumes:
      - .:/app:z
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgres://stt:${POSTGRES_PASSWORD:-stt_dev}@db:5432/stt
      - DJANGO_SETTINGS_MODULE=stt.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-test-secret-not-for-production}
    networks:
      - stt-network
    profiles:
      - test
    command: ["python", "-m", "pytest", "tests/", "-x", "-q"]

  # CLI service for one-off commands via docker-compose exec/run
  stt-cli:
    build:
      context: .
      target: dev
    container_name: stt-cli
    env_file:
      - .env
    volumes:
      - .:/app:z
      - ${AUDIO_INPUT_DIR:-./data/audio}:/app/data/audio:z
      - ${OUTPUT_DIR:-./data/output}:/app/data/output:z
    environment:
      - PYTHONPATH=/app
      - STT_SERVER_URL=${STT_SERVER_URL}
      - LOG_LEVEL=${LOG_LEVEL}
    network_mode: host
    profiles:
      - cli
    command: ["python", "-m", "stt"]

  # ML microservice: transcription (faster-whisper) + diarization (pyannote)
  stt-ml:
    build:
      context: ./services/ml
      secrets:
        - hf_token
    container_name: stt-ml
    ports:
      - "8091:8091"
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - DIARIZE_MODEL=${DIARIZE_MODEL:-pyannote/speaker-diarization-3.1}
      - DIARIZE_DEVICE=${DIARIZE_DEVICE:-cpu}
      - HF_STT_TOKEN=${HF_STT_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - stt-network
    profiles:
      - production
      - test
    restart: unless-stopped

  # Ollama LLM inference server
  # For development: runs on remote machine (192.168.178.80)
  # For production: runs alongside the STT stack
  ollama:
    image: ollama/ollama:latest
    container_name: stt-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - stt-network
    profiles:
      - ollama
    restart: unless-stopped

  # Remote Whisper transcription server (faster-whisper-server)
  # Run on a more powerful machine for faster transcription
  whisper-server:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: whisper-server
    ports:
      - "8001:8000"
    environment:
      - WHISPER__MODEL=${WHISPER_MODEL:-small}
      - WHISPER__DEVICE=${WHISPER_DEVICE:-cpu}
    networks:
      - stt-network
    profiles:
      - whisper-remote

  # Flutter mobile app development container
  flutter:
    build:
      context: ./mobile
    container_name: stt-flutter
    volumes:
      - ./mobile:/app:z
      - flutter_pub_cache:/home/appuser/.pub-cache
      - flutter_gradle:/home/appuser/.gradle
    networks:
      - stt-network
    profiles:
      - mobile
    command: bash

networks:
  stt-network:
    driver: bridge

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  ollama_data:
  flutter_pub_cache:
  flutter_gradle:

secrets:
  hf_token:
    environment: "HF_STT_TOKEN"
