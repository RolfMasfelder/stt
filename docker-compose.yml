services:
  db:
    image: postgres:17
    container_name: stt-db
    environment:
      POSTGRES_DB: stt
      POSTGRES_USER: stt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stt_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - stt-network

  # Caddy reverse-proxy with automatic TLS
  caddy:
    image: caddy:2-alpine
    container_name: stt-caddy
    depends_on:
      - stt-server
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-:443}
    networks:
      - stt-network
    profiles:
      - production
    restart: unless-stopped

  stt-server:
    build:
      context: .
      secrets:
        - hf_token
    container_name: stt-server
    depends_on:
      - db
    env_file:
      - .env
    expose:
      - "8090"
    volumes:
      - .:/app:z
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgres://stt:${POSTGRES_PASSWORD:-stt_dev}@db:5432/stt
      - DJANGO_SETTINGS_MODULE=stt.settings
      - LM_STUDIO_HOST=${LM_STUDIO_HOST}
      - LM_STUDIO_PORT=${LM_STUDIO_PORT}
      - LM_STUDIO_MODEL=${LM_STUDIO_MODEL}
      - WHISPER_MODEL=${WHISPER_MODEL}
      - WHISPER_DEVICE=${WHISPER_DEVICE}
      - WHISPER_API_URL=${WHISPER_API_URL}
      - HF_STT_TOKEN=${HF_STT_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-insecure-dev-key-change-in-production}
    networks:
      - stt-network
    profiles:
      - production
    command: ["python", "-m", "gunicorn", "stt.wsgi:application", "--bind", "0.0.0.0:8090", "--workers", "2", "--timeout", "600"]

  # django-q2 worker for async task processing
  stt-worker:
    build:
      context: .
      secrets:
        - hf_token
    container_name: stt-worker
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - .:/app:z
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgres://stt:${POSTGRES_PASSWORD:-stt_dev}@db:5432/stt
      - DJANGO_SETTINGS_MODULE=stt.settings
      - LM_STUDIO_HOST=${LM_STUDIO_HOST}
      - LM_STUDIO_PORT=${LM_STUDIO_PORT}
      - LM_STUDIO_MODEL=${LM_STUDIO_MODEL}
      - WHISPER_MODEL=${WHISPER_MODEL}
      - WHISPER_DEVICE=${WHISPER_DEVICE}
      - WHISPER_API_URL=${WHISPER_API_URL}
      - HF_STT_TOKEN=${HF_STT_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-insecure-dev-key-change-in-production}
    networks:
      - stt-network
    profiles:
      - production
    command: ["python", "manage.py", "qcluster"]

  # CLI service for one-off commands via docker-compose exec/run
  stt-cli:
    build:
      context: .
      secrets:
        - hf_token
    container_name: stt-cli
    env_file:
      - .env
    volumes:
      - .:/app:z
      - ${AUDIO_INPUT_DIR:-./data/audio}:/app/data/audio:z
      - ${OUTPUT_DIR:-./data/output}:/app/data/output:z
    environment:
      - PYTHONPATH=/app
      - STT_SERVER_URL=${STT_SERVER_URL}
      - LOG_LEVEL=${LOG_LEVEL}
    network_mode: host
    profiles:
      - cli
    command: ["python", "-m", "stt"]

  # Development service with host networking
  stt-dev:
    build:
      context: .
      secrets:
        - hf_token
    container_name: stt-dev
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - .:/app:z
      - ${AUDIO_INPUT_DIR:-./data/audio}:/app/data/audio:z
      - ${OUTPUT_DIR:-./data/output}:/app/data/output:z
    environment:
      - PYTHONPATH=/app
      - LM_STUDIO_HOST=${LM_STUDIO_HOST}
      - LM_STUDIO_PORT=${LM_STUDIO_PORT}
      - LM_STUDIO_MODEL=${LM_STUDIO_MODEL}
      - WHISPER_MODEL=${WHISPER_MODEL}
      - WHISPER_DEVICE=${WHISPER_DEVICE}
      - WHISPER_API_URL=${WHISPER_API_URL}
      - HF_STT_TOKEN=${HF_STT_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL}
      - DEVELOPMENT_MODE=${DEVELOPMENT_MODE}
      - DEBUG=${DEBUG}
      - DATABASE_URL=postgres://stt:${POSTGRES_PASSWORD:-stt_dev}@127.0.0.1:5432/stt
      - DJANGO_SETTINGS_MODULE=stt.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-insecure-dev-key-change-in-production}
    network_mode: host
    profiles:
      - dev
    command: bash

  # Remote Whisper transcription server (faster-whisper-server)
  # Run on a more powerful machine for faster transcription
  whisper-server:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: whisper-server
    ports:
      - "8001:8000"
    environment:
      - WHISPER__MODEL=${WHISPER_MODEL:-small}
      - WHISPER__DEVICE=${WHISPER_DEVICE:-cpu}
    networks:
      - stt-network
    profiles:
      - whisper-remote

networks:
  stt-network:
    driver: bridge

volumes:
  pgdata:
  caddy_data:
  caddy_config:

secrets:
  hf_token:
    environment: "HF_STT_TOKEN"
