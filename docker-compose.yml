services:
  db:
    image: postgres:17
    container_name: stt-db
    environment:
      POSTGRES_DB: stt
      POSTGRES_USER: stt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stt_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - stt-network
    profiles:
      - production
      - test

  # Caddy reverse-proxy with automatic TLS
  caddy:
    image: caddy:2-alpine
    container_name: stt-caddy
    depends_on:
      - stt-server
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-localhost}
    networks:
      - stt-network
    profiles:
      - production
    restart: unless-stopped

  stt-server:
    build:
      context: .
      target: production
      network: host
    image: 192.168.178.80:5000/stt-server:${IMAGE_TAG:-latest}
    container_name: stt-server
    depends_on:
      - db
      - stt-ml
      - ollama
    env_file:
      - .env
    ports:
      - "8090:8090"
    volumes:
      - .:/app:z
    environment:
      - PYTHONPATH=/app
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      - ML_SERVICE_URL=http://stt-ml:8091
      - LOG_LEVEL=${LOG_LEVEL}
      - DATABASE_URL=postgres://stt:${POSTGRES_PASSWORD:-stt_dev}@db:5432/stt
      - DJANGO_SETTINGS_MODULE=stt.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-insecure-dev-key-change-in-production}
    networks:
      - stt-network
    profiles:
      - production
    command: ["python", "-m", "gunicorn", "stt.wsgi:application", "--bind", "0.0.0.0:8090", "--workers", "2", "--timeout", "${GUNICORN_TIMEOUT:-600}"]

  # django-q2 worker for async task processing
  stt-worker:
    build:
      context: .
      target: production
      network: host
    image: 192.168.178.80:5000/stt-server:${IMAGE_TAG:-latest}
    container_name: stt-worker
    depends_on:
      - db
      - stt-ml
      - ollama
    env_file:
      - .env
    volumes:
      - .:/app:z
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgres://stt:${POSTGRES_PASSWORD:-stt_dev}@db:5432/stt
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      - ML_SERVICE_URL=http://stt-ml:8091
      - LOG_LEVEL=${LOG_LEVEL}
      - DJANGO_SETTINGS_MODULE=stt.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-insecure-dev-key-change-in-production}
    networks:
      - stt-network
    profiles:
      - production
    command: ["python", "manage.py", "qcluster"]

  # ML worker — processes Whisper/pyannote/LLM tasks (cluster "ml")
  # Runs alongside stt-worker (cluster "stt" = scheduled tasks).
  # In Kubernetes, this runs on GPU nodes; locally both share the same image.
  stt-ml-worker:
    build:
      context: .
      target: production
      network: host
    image: 192.168.178.80:5000/stt-server:${IMAGE_TAG:-latest}
    container_name: stt-ml-worker
    depends_on:
      - db
      - stt-ml
      - ollama
    env_file:
      - .env
    volumes:
      - .:/app:z
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgres://stt:${POSTGRES_PASSWORD:-stt_dev}@db:5432/stt
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      - ML_SERVICE_URL=http://stt-ml:8091
      - LOG_LEVEL=${LOG_LEVEL}
      - DJANGO_SETTINGS_MODULE=stt.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-insecure-dev-key-change-in-production}
      - Q_CLUSTER_NAME=ml
    networks:
      - stt-network
    profiles:
      - production
      - web-dev
    command: ["python", "manage.py", "qcluster"]

  # Test runner service (dev stage with pytest, ruff, bandit)
  stt-test:
    build:
      context: .
      target: dev
      network: host
    container_name: stt-test
    depends_on:
      - db
    volumes:
      - .:/app:z
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgres://stt:${POSTGRES_PASSWORD:-stt_dev}@db:5432/stt
      - DJANGO_SETTINGS_MODULE=stt.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-test-secret-not-for-production}
    networks:
      - stt-network
    profiles:
      - test
    command: ["python", "-m", "pytest", "tests/", "-x", "-q"]

  # CLI service for one-off commands via docker-compose exec/run
  stt-cli:
    build:
      context: .
      target: dev
      network: host
    container_name: stt-cli
    env_file:
      - .env
    volumes:
      - .:/app:z
      - ${AUDIO_INPUT_DIR:-./data/audio}:/app/data/audio:z
      - ${OUTPUT_DIR:-./data/output}:/app/data/output:z
      - caddy_data:/caddy_data:ro
    environment:
      - PYTHONPATH=/app
      - STT_SERVER_URL=${STT_SERVER_URL:-https://localhost}
      - OAUTH2_TOKEN_URL=${OAUTH2_TOKEN_URL:-}
      - OAUTH2_CLIENT_ID=${OAUTH2_CLIENT_ID:-}
      - OAUTH2_CLIENT_SECRET=${OAUTH2_CLIENT_SECRET:-}
      - OAUTH2_SCOPES=${OAUTH2_SCOPES:-read write}
      - LOG_LEVEL=${LOG_LEVEL}
      - REQUESTS_CA_BUNDLE=${REQUESTS_CA_BUNDLE:-/caddy_data/caddy/pki/authorities/local/root.crt}
    network_mode: host
    profiles:
      - cli
    command: ["python", "-m", "stt"]

  # ML microservice: transcription (faster-whisper) + diarization (pyannote)
  stt-ml:
    build:
      context: ./services/ml
      network: host
      secrets:
        - hf_token
    image: 192.168.178.80:5000/stt-ml:${IMAGE_TAG:-latest}
    container_name: stt-ml
    ports:
      - "8091:8091"
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - DIARIZE_MODEL=${DIARIZE_MODEL:-pyannote/speaker-diarization-3.1}
      - DIARIZE_DEVICE=${DIARIZE_DEVICE:-cpu}
      - HF_STT_TOKEN=${HF_STT_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - stt-network
    profiles:
      - production
      - test
    restart: unless-stopped

  # Ollama LLM inference server — runs as part of the production stack.
  # Independent from k3s: both setups manage their own Ollama instance.
  ollama:
    image: ollama/ollama:0.24.0
    container_name: stt-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - stt-network
    profiles:
      - production
      - ollama
    restart: unless-stopped

  # Remote Whisper transcription server (faster-whisper-server)
  # Run on a more powerful machine for faster transcription
  whisper-server:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: whisper-server
    ports:
      - "8001:8000"
    environment:
      - WHISPER__MODEL=${WHISPER_MODEL:-small}
      - WHISPER__DEVICE=${WHISPER_DEVICE:-cpu}
    networks:
      - stt-network
    profiles:
      - whisper-remote

  # Flutter mobile app development container
  flutter:
    build:
      context: ./mobile
      network: host
    container_name: stt-flutter
    volumes:
      - ./mobile:/app:z
      - flutter_pub_cache:/home/appuser/.pub-cache
      - flutter_gradle:/home/appuser/.gradle
    networks:
      - stt-network
    profiles:
      - mobile
    command: bash

  # Flutter web UI — production image served by nginx (~30 MB)
  # Accessible at https://<SITE_ADDRESS>/ui/ via Caddy
  flutter-web:
    build:
      context: ./mobile
      target: web-runner
      network: host
    image: 192.168.178.80:5000/stt-flutter-web:${IMAGE_TAG:-latest}
    container_name: stt-flutter-web
    networks:
      - stt-network
    profiles:
      - production
    restart: unless-stopped

networks:
  stt-network:
    driver: bridge

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  ollama_data:
  flutter_pub_cache:
  flutter_gradle:

secrets:
  hf_token:
    environment: "HF_STT_TOKEN"
