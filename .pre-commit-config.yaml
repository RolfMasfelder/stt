# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
fail_fast: false  # Don't stop on first failure, let all tools run
default_stages: [pre-commit]

repos:
  # First, run ruff for linting and auto-fixes (before formatting)
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: "v0.12.5"
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types: [python]

  # Then run black for formatting (after ruff fixes)
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        args: [--config, pyproject.toml]
        types: [python]
        language_version: python3.12

  # Finally, run ruff again to check formatting (but without --fix to avoid conflicts)
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: "v0.12.5"
    hooks:
      - id: ruff-format
        types: [python]

  # Other hooks that don't conflict with formatting
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-docstring-first
      - id: check-toml
      - id: check-yaml
        exclude: ^k8s/.*\.yaml$  # Exclude Kubernetes files
      - id: check-yaml
        name: check-yaml-k8s
        files: ^k8s/.*\.yaml$
        args: ['--allow-multiple-documents']
      - id: check-json
      - id: check-added-large-files
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: debug-statements
#      - id: double-quote-string-fixer
      - id: name-tests-test
        args: [--django]
      - id: requirements-txt-fixer

  # dependency management
